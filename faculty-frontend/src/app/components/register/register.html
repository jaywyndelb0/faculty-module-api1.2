<div class="auth-container">
  <div class="auth-card animate-fade-in">
    <div class="auth-header">
      <div class="logo">🏫</div>
      <h2>Create Account</h2>
      <p>Join the EduAdmin school management system</p>
    </div>
    
    <div *ngIf="error" class="error-alert">
      <span class="icon">⚠️</span>
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input 
            type="text" 
            name="name" 
            [(ngModel)]="user.name" 
            required 
            pattern="^[a-zA-Z\s]*$"
            #name="ngModel"
            placeholder="Juan Dela Cruz">
        </div>
        <div *ngIf="name.invalid && (name.dirty || name.touched)" class="error-text">
          <span *ngIf="name.errors?.['required']">Name is required</span>
          <span *ngIf="name.errors?.['pattern']">Name should only contain letters</span>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input 
            type="email" 
            name="email" 
            [(ngModel)]="user.email" 
            required 
            email
            #email="ngModel"
            placeholder="juan@school.edu">
        </div>
        <div *ngIf="email.invalid && (email.dirty || email.touched)" class="error-text">
          <span *ngIf="email.errors?.['required']">Email is required</span>
          <span *ngIf="email.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input 
            type="password" 
            name="password" 
            [(ngModel)]="user.password" 
            required 
            minlength="8"
            #password="ngModel"
            placeholder="Minimum 8 characters">
        </div>
        <div *ngIf="password.invalid && (password.dirty || password.touched)" class="error-text">
          <span *ngIf="password.errors?.['required']">Password is required</span>
          <span *ngIf="password.errors?.['minlength']">Password must be at least 8 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input 
            type="password" 
            name="password_confirmation" 
            [(ngModel)]="user.password_confirmation" 
            required 
            #confirm="ngModel"
            placeholder="Repeat password">
        </div>
        <div *ngIf="confirm.touched && user.password !== user.password_confirmation" class="error-text">
          Passwords do not match
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="!registerForm.form.valid || user.password !== user.password_confirmation || isLoading">
        <span *ngIf="isLoading" class="icon-spin">⏳</span>
        {{ isLoading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>

<style>
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f8fafc;
  padding: 2rem;
}
.auth-card {
  background: white;
  padding: 2.5rem;
  border-radius: 1.5rem;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  width: 100%;
  max-width: 440px;
}
.auth-header { text-align: center; margin-bottom: 2rem; }
.logo { font-size: 3rem; margin-bottom: 1rem; }
.auth-header h2 { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
.auth-header p { color: #64748b; font-size: 0.875rem; }

.error-alert {
  background: #fef2f2;
  color: #dc2626;
  padding: 0.75rem 1rem;
  border-radius: 0.5rem;
  font-size: 0.875rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.auth-form .form-group { margin-bottom: 1.25rem; }
.auth-form label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }

.btn-block { width: 100%; justify-content: center; padding: 0.75rem; font-size: 1rem; }

.auth-footer {
  text-align: center;
  margin-top: 2rem;
  font-size: 0.875rem;
  color: #64748b;
}
.auth-footer a { color: #3b82f6; text-decoration: none; font-weight: 600; }
</style>
