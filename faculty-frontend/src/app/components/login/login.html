<div class="login-page">
  <div class="glass-card animate-fade-in">
    <div class="header-section">
      <div class="brand-logo">🏫</div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to EduAdmin Dashboard</p>
    </div>

    <div *ngIf="error" class="error-alert">
      <span>⚠️</span>
      <span>{{ error }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-container">
          <i>✉️</i>
          <input 
            type="email" 
            name="email" 
            [(ngModel)]="credentials.email" 
            required 
            email
            #email="ngModel"
            placeholder="admin@school.edu">
        </div>
        <div *ngIf="email.invalid && (email.dirty || email.touched)" class="validation-error">
          <span *ngIf="email.errors?.['required']">Email is required</span>
          <span *ngIf="email.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-container">
          <i>🔒</i>
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            name="password" 
            [(ngModel)]="credentials.password" 
            required 
            minlength="6"
            #password="ngModel"
            placeholder="••••••••">
          <button type="button" class="toggle-password" (click)="togglePassword()" tabindex="-1">
            {{ showPassword ? '👁️' : '🙈' }}
          </button>
        </div>
        <div *ngIf="password.invalid && (password.dirty || password.touched)" class="validation-error">
          <span *ngIf="password.errors?.['required']">Password is required</span>
          <span *ngIf="password.errors?.['minlength']">Minimum 6 characters</span>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox">
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-login" [disabled]="!loginForm.form.valid || isLoading">
        <div *ngIf="isLoading" class="spinner"></div>
        <span>{{ isLoading ? 'Authenticating...' : 'Sign In' }}</span>
      </button>
    </form>

    <div class="card-footer">
      <p class="footer-text">
        New to the system? 
        <a routerLink="/register" class="register-link">Create an account</a>
      </p>
    </div>
  </div>
</div>
