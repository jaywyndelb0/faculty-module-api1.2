<div class="auth-container">
  <div class="auth-card animate-fade-in">
    <div class="auth-header">
      <div class="logo">🏫</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your EduAdmin account</p>
    </div>
    
    <div *ngIf="error" class="error-alert">
      <span class="icon">⚠️</span>
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input 
            type="email" 
            name="email" 
            [(ngModel)]="credentials.email" 
            required 
            email
            #email="ngModel"
            placeholder="admin@school.edu">
        </div>
        <div *ngIf="email.invalid && (email.dirty || email.touched)" class="error-text">
          <span *ngIf="email.errors?.['required']">Email is required</span>
          <span *ngIf="email.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input 
            type="password" 
            name="password" 
            [(ngModel)]="credentials.password" 
            required 
            minlength="6"
            #password="ngModel"
            placeholder="••••••••">
        </div>
        <div *ngIf="password.invalid && (password.dirty || password.touched)" class="error-text">
          <span *ngIf="password.errors?.['required']">Password is required</span>
          <span *ngIf="password.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="auth-actions">
        <label class="remember-me">
          <input type="checkbox"> Remember me
        </label>
        <a href="#" class="forgot-pwd">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="!loginForm.form.valid || isLoading">
        <span *ngIf="isLoading" class="icon-spin">⏳</span>
        {{ isLoading ? 'Signing In...' : 'Sign In' }}
      </button>
    </form>

    <div class="auth-footer">
      New to the system? <a routerLink="/register">Create an account</a>
    </div>
  </div>
</div>

<style>
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f8fafc;
  padding: 2rem;
}
.auth-card {
  background: white;
  padding: 2.5rem;
  border-radius: 1.5rem;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  width: 100%;
  max-width: 440px;
}
.auth-header { text-align: center; margin-bottom: 2rem; }
.logo { font-size: 3rem; margin-bottom: 1rem; }
.auth-header h2 { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
.auth-header p { color: #64748b; font-size: 0.875rem; }

.error-alert {
  background: #fef2f2;
  color: #dc2626;
  padding: 0.75rem 1rem;
  border-radius: 0.5rem;
  font-size: 0.875rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.auth-form .form-group { margin-bottom: 1.25rem; }
.auth-form label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }

.auth-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  font-size: 0.875rem;
}
.remember-me { color: #64748b; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
.forgot-pwd { color: #3b82f6; text-decoration: none; font-weight: 600; }

.btn-block { width: 100%; justify-content: center; padding: 0.75rem; font-size: 1rem; }

.auth-footer {
  text-align: center;
  margin-top: 2rem;
  font-size: 0.875rem;
  color: #64748b;
}
.auth-footer a { color: #3b82f6; text-decoration: none; font-weight: 600; }
</style>
