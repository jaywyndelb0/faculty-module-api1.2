version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faculty_module_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - mysql
    networks:
      - faculty_net

  nginx:
    image: nginx:alpine
    container_name: faculty_module_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/conf/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - faculty_net

  mysql:
    image: mysql:8.0
    container_name: faculty_module_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: faculty_module_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: faculty_user
      MYSQL_PASSWORD: faculty_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - faculty_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: faculty_module_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - faculty_net

volumes:
  mysql_data:

networks:
  faculty_net:
    driver: bridge